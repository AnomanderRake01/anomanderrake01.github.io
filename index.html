<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R Model: 4D Helix Visualizer</title>
    <style>
        body { margin: 0; background: #050505; color: #58a6ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 500px; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 1px solid #30363d; z-index: 10; }
        input[type=range] { width: 100%; accent-color: #58a6ff; cursor: pointer; }
        .legend { display: flex; justify-content: space-around; font-size: 10px; margin-top: 10px; }
        .label { color: #8b949e; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="label" id="status">System State: Chaos</div>
        <input type="range" id="optimSlider" min="1" max="100" value="1">
        <div class="legend">
            <span style="color:#00f2ff">Physical</span>
            <span style="color:#ff00ff">Structural</span>
            <span style="color:#ffee00">Social</span>
            <span style="color:#00ff88">Philosophy</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const colors = [0x00f2ff, 0xff00ff, 0ffee00, 0x00ff88];
        const strands = [];
        const numPoints = 100;

        // Create 4 strands
        for (let s = 0; s < 4; s++) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(numPoints * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: colors[s], linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            strands.push(line);
        }

        camera.position.z = 15;

        function updateHelix(t, optimization) {
            const tightness = 0.1 + (optimization * 0.05);
            const radius = 4 - (optimization * 0.035);
            
            strands.forEach((line, sIndex) => {
                const positions = line.geometry.attributes.position.array;
                const offset = (sIndex * Math.PI) / 2; // Offset strands by 90 degrees

                for (let i = 0; i < numPoints; i++) {
                    const y = (i - numPoints / 2) * 0.2;
                    const angle = y * tightness + t + offset;
                    
                    positions[i * 3] = Math.cos(angle) * radius;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = Math.sin(angle) * radius;
                }
                line.geometry.attributes.position.needsUpdate = true;
            });
        }

        const slider = document.getElementById('optimSlider');
        const statusText = document.getElementById('status');
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            const optVal = parseInt(slider.value);
            
            if (optVal < 30) statusText.innerText = "System State: Chaos";
            else if (optVal < 80) statusText.innerText = "System State: Fixing System";
            else statusText.innerText = "System State: Nash Equilibrium";

            updateHelix(time, optVal);
            scene.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
