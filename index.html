<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R Model: 4D DNA Helix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; 
              background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 20px; 
              border: 1px solid #333; text-align: center; color: #58a6ff; z-index: 100; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #58a6ff; }
        .title { font-size: 12px; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="title" id="status">System State: Chaos</div>
        <input type="range" id="optimSlider" min="0" max="100" value="10">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting for 3D depth
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x58a6ff, 1);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        const colors = [0x00f2ff, 0xff00ff, 0xffee00, 0x00ff88];
        const strands = [];
        const strandGroup = new THREE.Group();
        scene.add(strandGroup);

        function createStrand(color, offset) {
            const points = [];
            for (let i = 0; i <= 60; i++) {
                points.push(new THREE.Vector3(0, i, 0));
            }
            const curve = new THREE.CatmullRomCurve3(points);
            const geometry = new THREE.TubeGeometry(curve, 100, 0.15, 8, false);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
            const mesh = new THREE.Mesh(geometry, material);
            return { mesh, offset };
        }

        colors.forEach((c, i) => {
            const s = createStrand(c, (i * Math.PI) / 2);
            strands.push(s);
            strandGroup.add(s.mesh);
        });

        camera.position.z = 15;
        camera.position.y = 5;

        const slider = document.getElementById('optimSlider');
        const statusText = document.getElementById('status');

        function animate() {
            requestAnimationFrame(animate);
            const val = slider.value / 100;
            const time = Date.now() * 0.001;

            // Mathematical "Fixing": Higher slider = tighter, more organized helix
            const radius = 5 - (val * 3);
            const frequency = 0.5 + (val * 1.5);

            strands.forEach((s, index) => {
                const positions = s.mesh.geometry.parameters.path.points;
                for (let i = 0; i < positions.length; i++) {
                    const y = (i - 30) * 0.4;
                    const angle = y * frequency + time + s.offset;
                    positions[i].x = Math.cos(angle) * radius;
                    positions[i].y = y;
                    positions[i].z = Math.sin(angle) * radius;
                }
                // Important: Redraw the tube geometry every frame to keep it smooth
                s.mesh.geometry.dispose();
                s.mesh.geometry = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(positions), 64, 0.12, 8, false);
            });

            if (val < 0.3) statusText.innerText = "System State: Chaos";
            else if (val < 0.8) statusText.innerText = "System State: Fixing System";
            else statusText.innerText = "System State: Equilibrium";

            strandGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
