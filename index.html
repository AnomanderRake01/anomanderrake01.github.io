<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R Model: DNA System Helix</title>
    <style>
        body { margin: 0; background: #050505; color: #58a6ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; text-align: center; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 20px; border: 1px solid #30363d; z-index: 10; }
        input[type=range] { width: 100%; accent-color: #58a6ff; cursor: pointer; margin-top: 10px; }
        .status { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">System: Chaos</div>
        <input type="range" id="optimSlider" min="1" max="100" value="10">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add proper lighting to see the 3D volume
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const colors = [0x00f2ff, 0xff00ff, 0xffee00, 0x00ff88];
        const helixGroup = new THREE.Group();
        scene.add(helixGroup);

        // Create 4 DNA-style strands
        const createStrand = (color, phase) => {
            const points = [];
            for (let i = 0; i <= 100; i++) {
                const y = (i - 50) * 0.3;
                const x = Math.cos(i * 0.2 + phase) * 4;
                const z = Math.sin(i * 0.2 + phase) * 4;
                points.push(new THREE.Vector3(x, y, z));
            }
            const curve = new THREE.CatmullRomCurve3(points);
            const geometry = new THREE.TubeGeometry(curve, 100, 0.15, 8, false);
            const material = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 });
            return new THREE.Mesh(geometry, material);
        };

        const strands = colors.map((c, i) => {
            const mesh = createStrand(c, (i * Math.PI) / 2);
            helixGroup.add(mesh);
            return mesh;
        });

        camera.position.z = 20;

        const slider = document.getElementById('optimSlider');
        const statusText = document.getElementById('status');

        function animate() {
            requestAnimationFrame(animate);
            const val = slider.value / 100;
            
            // Adjust helix "Tightness" (Chaos vs Equilibrium)
            helixGroup.scale.x = 1.5 - (val * 1.2);
            helixGroup.scale.z = 1.5 - (val * 1.2);
            helixGroup.rotation.y += 0.01;

            if (val < 0.3) statusText.innerText = "System: Chaos";
            else if (val < 0.8) statusText.innerText = "System: Fixing";
            else statusText.innerText = "System: Equilibrium";

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
